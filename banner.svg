<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400" role="img" aria-label="Kshitij Singh — AI Engineer, Generative AI, Full-Stack Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0c10"/>
      <stop offset="0.5" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#090b0f"/>
    </linearGradient>
    <radialGradient id="orbA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4f46e5" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#58a6ff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="vign" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff"/>
    </pattern>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#dots)" opacity="0.05"/>

  <g>
    <ellipse cx="520" cy="150" rx="360" ry="300" fill="url(#orbA)"/>
    <ellipse cx="780" cy="220" rx="380" ry="300" fill="url(#orbB)"/>
    <ellipse cx="650" cy="120" rx="300" ry="240" fill="url(#orbC)"/>
  </g>

  <g fill="none" stroke="#3b82f6" opacity="0.10">
    <circle cx="640" cy="196" r="150" stroke-width="1"/>
    <circle cx="640" cy="196" r="230" stroke-width="1"/>
    <circle cx="640" cy="196" r="320" stroke-width="1"/>
  </g>

  <g fill="#58a6ff" opacity="0.55">
    <circle cx="330" cy="120" r="2.5"/>
    <circle cx="965" cy="150" r="2.5"/>
    <circle cx="400" cy="300" r="2"/>
    <circle cx="900" cy="300" r="2"/>
  </g>

  <rect x="0" y="0" width="1280" height="1.5" fill="url(#hair)"/>
  <rect width="1280" height="400" fill="url(#vign)"/>

  <text x="640" y="188" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="600" letter-spacing="1" fill="#f5f7fa">Kshitij Singh</text>
  <rect x="592" y="214" width="96" height="3" rx="1.5" fill="url(#rule)"/>
  <text x="642" y="256" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="500" letter-spacing="7" fill="#9aa4b2">AI ENGINEER&#160;&#160;·&#160;&#160;GENERATIVE AI&#160;&#160;·&#160;&#160;FULL-STACK</text>
  <text x="640" y="292" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="13.5" fill="#5b6673">building production-ready AI systems — RAG · agents · full-stack</text>
</svg>
